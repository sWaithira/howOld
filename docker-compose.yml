services:
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

  prod:
    build:
      context: .
      target: production
    ports:
      - "3000:80"
    restart: unless-stopped